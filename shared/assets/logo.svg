<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Optional, transparent by default) -->
  
  <!-- 1. Four Candlesticks (Reference Base + Narrowed Span) -->
  <!-- Candle 1 (Big Base Reference Red Yang) - x=50 -->
  <line x1="50" y1="150" x2="50" y2="70" stroke="#ff3333" stroke-width="2" />
  <rect x="42" y="80" width="16" height="60" fill="#ff3333" />
  
  <!-- Candle 2 (Small Red Yang - Swapped) - x=83 -->
  <line x1="83" y1="95" x2="83" y2="50" stroke="#ff3333" stroke-width="2" />
  <rect x="75" y="65" width="16" height="25" fill="#ff3333" />
  
  <!-- Candle 3 (Gap-up Adjustment - Blue Um) - x=117 -->
  <line x1="117" y1="100" x2="117" y2="25" stroke="#3366ff" stroke-width="2" />
  <rect x="109" y="40" width="16" height="50" fill="#3366ff" />
  
  <!-- Candle 4 (Large Red Yang - Swapped) - x=150 -->
  <line x1="150" y1="90" x2="150" y2="40" stroke="#ff3333" stroke-width="2" />
  <rect x="142" y="55" width="16" height="30" fill="#ff3333" />

  <!-- 2. Text Overlay "Sotdanji Lab" (Balanced Margin) -->
  <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feFlood flood-color="#000000" result="flood" />
    <feComposite in="flood" in2="SourceGraphic" operator="in" result="mask" />
    <feMorphology in="mask" operator="dilate" radius="2" result="dilated" />
    <feGaussianBlur in="dilated" stdDeviation="1" result="blurred" />
    <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>

  <text x="100" y="185" font-family="Arial, sans-serif" font-weight="bold" font-size="20" text-anchor="middle" fill="#ffffff" filter="url(#textGlow)" letter-spacing="1.5">Sotdanji Lab</text>
</svg>
