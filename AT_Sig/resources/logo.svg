<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Optional, transparent by default) -->
  
  <!-- 1. The Cauldron (Sotdanji) - Black Silhouette -->
  <!-- Main body: a large semi-circle/bowl shape -->
  <path d="M40,110 Q100,180 160,110 L160,90 L40,90 Z" fill="#1a1a1a" />
  <!-- Rim/Lid Handle Area -->
  <rect x="35" y="85" width="130" height="15" rx="2" fill="#1a1a1a" />
  <!-- Cauldron Legs (Classic Tripod style for Gam-a-sot) -->
  <path d="M60,150 L50,170 M140,150 L150,170" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" />

  <!-- 2. Three Red Bullish Candlesticks (Rising from inside) -->
  <!-- Candle 1 -->
  <line x1="70" y1="85" x2="70" y2="55" stroke="#ff3333" stroke-width="2" /> <!-- Wick -->
  <rect x="62" y="65" width="16" height="20" fill="#ff3333" /> <!-- Body -->
  
  <!-- Candle 2 -->
  <line x1="100" y1="75" x2="100" y2="35" stroke="#ff3333" stroke-width="2" />
  <rect x="92" y="45" width="16" height="30" fill="#ff3333" />
  
  <!-- Candle 3 (Highest) -->
  <line x1="130" y1="65" x2="130" y2="15" stroke="#ff3333" stroke-width="2" />
  <rect x="122" y="25" width="16" height="40" fill="#ff3333" />

  <!-- 3. Text Overlay "Sotdanji Lab" -->
  <!-- Adding a slight shadow/glow for readability against the busy background -->
  <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feFlood flood-color="#000000" result="flood" />
    <feComposite in="flood" in2="SourceGraphic" operator="in" result="mask" />
    <feMorphology in="mask" operator="dilate" radius="2" result="dilated" />
    <feGaussianBlur in="dilated" stdDeviation="1" result="blurred" />
    <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>

  <!-- Main Text -->
  <text x="100" y="125" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#ffffff" filter="url(#textGlow)" letter-spacing="1">Sotdanji Lab</text>
  
</svg>
